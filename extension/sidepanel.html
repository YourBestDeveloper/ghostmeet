<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ghostmeet — live captions</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div id="header">
    <div class="logo">👻 ghostmeet</div>
    <div id="status" class="status disconnected">disconnected</div>
  </div>

  <div id="capture-controls">
    <div class="source-row">
      <label><input type="radio" name="audioSource" id="srcMic" value="mic" checked /> Microphone</label>
      <label><input type="radio" name="audioSource" id="srcTab" value="tab" /> Tab audio</label>
    </div>
    <div class="capture-btn-row">
      <button id="btn-start">▶ Start</button>
      <button id="btn-stop" disabled>⏹ Stop</button>
    </div>
  </div>

  <div id="controls">
    <select id="language">
      <option value="">Auto-detect</option>
      <option value="en">English</option>
      <option value="ko">한국어</option>
      <option value="ja">日本語</option>
      <option value="zh">中文</option>
    </select>
    <button id="btn-summarize">📋 Summarize</button>
    <div class="controls-divider"></div>
    <button id="btn-copy" title="Copy all to clipboard">📄</button>
    <button id="btn-clear" title="Clear transcript">🗑️</button>
  </div>

  <div id="transcript-container">
    <div id="transcript"></div>
    <div id="empty-state">
      <p>🎧 Start capturing audio to see live captions</p>
    </div>
  </div>

  <div id="footer">
    <span id="segment-count">0 segments</span>
    <span id="duration">00:00</span>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
