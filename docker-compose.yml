services:
  backend:
    build:
      context: .
      args:
        WHISPER_MODEL: tiny  # tiny | base | small | medium
    ports:
      - "8877:8877"
    volumes:
      - ./recordings:/app/recordings
    environment:
      - GHOSTMEET_MODEL=tiny
      - GHOSTMEET_DEVICE=cpu
      # GHOSTMEET_LANGUAGE: auto-detect by default. Uncomment and set for specific language.
      # - GHOSTMEET_LANGUAGE=en
      - GHOSTMEET_CHUNK_INTERVAL=5  # seconds between transcription chunks
      - GHOSTMEET_ANTHROPIC_KEY=   # required for summary feature
    restart: unless-stopped
